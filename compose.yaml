services:
  pwa-soundboard:
    build: .
    container_name: pwa-soundboard
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./audio:/samples # bind-mount your local audio files here
    environment:
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-3000}"
      ORIGIN: "${ORIGIN:-}"
      SAMPLES_DIR: /samples
    restart: unless-stopped
