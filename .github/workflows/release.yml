name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

# Queue pushes to the same ref instead of racing them: a version-bump push
# right after a merge would otherwise start before the merge build has written
# its layer cache and pay for a full rebuild. Note GitHub keeps only the newest
# pending run per group, so rapid-fire pushes may skip building intermediate
# commits; only tag commits that were the tip of a push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - run: npm run lint

  # Each architecture builds natively (arm64 on an arm runner, no QEMU) and
  # pushes by digest; the merge job below stitches the digests into one
  # multi-arch manifest.
  build:
    if: github.ref_type == 'branch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Build context only, no git operations: don't leave the token in
          # .git/config where `COPY . .` could pull it into a build layer.
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=sha,prefix=sha-

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/pwa-soundboard,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          cache: true

      - name: Scan image with Trivy
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard@${{ steps.build.outputs.digest }}
        run: |
          trivy image \
            --platform ${{ matrix.platform }} \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --pkg-types os,library \
            "$IMAGE"

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Create multi-arch manifest
        id: manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          tag_args=$(printf '%s\n' "$TAGS" | grep -v '^$' | sed 's/^/-t /' | tr '\n' ' ')
          # shellcheck disable=SC2086,SC2046
          docker buildx imagetools create $tag_args \
            $(printf "$IMAGE@sha256:%s " *)
          digest=$(docker buildx imagetools inspect "$IMAGE:sha-${GITHUB_SHA::7}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  # Tag pushes don't rebuild: the commit was already built, scanned, and
  # attested when it landed on main, so the release tags are stamped onto that
  # exact image. Polls briefly because `git push --follow-tags` starts the
  # branch and tag runs at the same time.
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: lint
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
      # Lets the promote step query whether this commit was built on the
      # default branch (the fail-fast guard below).
      actions: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release tag metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Promote release tags
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          TAGS: ${{ steps.meta.outputs.tags }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          SOURCE="$IMAGE:sha-${GITHUB_SHA::7}"

          # Fail fast when the tag points at a commit that was never built on
          # the default branch. promote never builds; it only stamps release
          # tags onto the image the branch run already pushed. A tag left on a
          # pre-merge commit (e.g. `npm version` run before merging the default
          # branch) would otherwise poll for an image that can never appear.
          #
          # Count default-branch Release runs for this exact commit, excluding
          # cancelled/skipped ones: a run superseded while still pending under
          # the concurrency group above never produced an image. In-progress
          # runs (conclusion null) are kept on purpose -- with
          # `git push --follow-tags` the branch build runs concurrently with
          # this tag run, and `needs: lint` above buys enough time for it to be
          # listed before this query.
          # Fail-open on an API error: the guard is only an optimization, and
          # the poll below is the real source of truth for whether the image
          # exists. A transient gh/API hiccup must not fail a valid release.
          if ! builds=$(gh api \
            "repos/$REPO/actions/workflows/release.yml/runs?head_sha=$GITHUB_SHA&branch=$DEFAULT_BRANCH" \
            --jq '[.workflow_runs[] | select(.conclusion != "cancelled" and .conclusion != "skipped")] | length'); then
            echo "warning: could not query Release runs for ${GITHUB_SHA::7}; skipping the build-exists guard and polling directly"
            builds=""
          fi
          if [ "$builds" = "0" ]; then
            echo "::error::Commit ${GITHUB_SHA::7} was never built on $DEFAULT_BRANCH, so $SOURCE does not exist. Re-tag the built commit you intend to release (confirm its package.json version matches $GITHUB_REF_NAME), e.g. git tag -f $GITHUB_REF_NAME <sha> && git push -f origin $GITHUB_REF_NAME" >&2
            exit 1
          fi

          # A usable branch run exists (possibly still building). Poll for the
          # image. The guard already fails the doomed case fast, so keep a
          # generous ceiling here: this path only runs on a legit release whose
          # build is still in flight (push --follow-tags), where a false timeout
          # would fail a valid tag. 30 min covers a cold-cache multi-arch build
          # plus the Trivy scan and manifest merge.
          echo "found ${builds:-unknown} $DEFAULT_BRANCH Release run(s) for ${GITHUB_SHA::7}; waiting for $SOURCE"
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "$SOURCE" >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::$SOURCE not found after 30 minutes despite a $DEFAULT_BRANCH run for this commit. Check that run's build job." >&2
              exit 1
            fi
            sleep 30
          done
          digest=$(docker buildx imagetools inspect "$SOURCE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          printf '%s\n' "$TAGS" \
            | grep -v '^$' \
            | xargs -r -P4 -I{} sh -c 'echo "promoting $1"; docker buildx imagetools create -t "$1" "$2"' _ {} "$IMAGE@$digest"
