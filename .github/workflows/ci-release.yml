name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

# Cancel in-progress PR runs, but queue main branch builds to avoid racing
concurrency:
  group: ci-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - working-directory: server
        run: npm ci --omit=dev
      - run: npm run lint

  test_unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - working-directory: server
        run: npm ci --omit=dev
      - working-directory: client
        run: npm run test:unit:coverage -- --reporter=junit --outputFile=test-results/junit.xml
      - name: Generate test badge
        run: |
          pip install --break-system-packages genbadge[tests]
          genbadge tests -i client/test-results/junit.xml -o client/test-results/badge.svg
      - name: Commit test badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/test-results/badge.svg
          git diff --cached --quiet || git commit -m "chore(ci): update test badge [skip ci]"
          git pull --rebase || true
          git push || { echo "warning: badge push failed (likely a race); will retry on next run"; exit 0; }
      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: client/coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - working-directory: server
        run: npm ci --omit=dev
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: client/dist/
          retention-days: 1
          if-no-files-found: error

  build_docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build Docker image
        run: docker build -t pwa-soundboard:smoke -f docker/Dockerfile .
      - name: Start container and smoke test
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 3000:3000 \
            -e HOST=0.0.0.0 -e PORT=3000 \
            pwa-soundboard:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/ >/dev/null 2>&1; then
              echo "Container is responding"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container did not respond within 15 seconds"
          docker logs smoke
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

  test_e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    strategy:
      fail-fast: false
      matrix:
        shard: [1]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - working-directory: server
        run: npm ci --omit=dev
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: client/dist/
      - name: cache playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: client
        run: npx playwright install chromium
      - working-directory: client
        run: npx playwright install-deps chromium
      - working-directory: client
        run: npx playwright test --shard=${{ matrix.shard }}/1 --reporter=blob
        env:
          PW_SKIP_BUILD: "1"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shard }}
          path: client/blob-report/
          retention-days: 7

  merge_report:
    needs: test_e2e
    if: ${{ !cancelled() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - working-directory: client
        run: npm ci
      - working-directory: server
        run: npm ci --omit=dev
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: all-blob-reports/
          merge-multiple: true
      - working-directory: client
        run: npx playwright merge-reports --reporter html ../all-blob-reports
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  ci_ok:
    needs: [lint, test_unit, build, build_docker, test_e2e]
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: verify all jobs succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "results: $results"
          for r in $results; do
            [ "$r" = "success" ] || { echo "a required job did not succeed"; exit 1; }
          done

  release_build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=sha,prefix=sha-

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/pwa-soundboard,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          cache: true

      - name: Scan image with Trivy
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard@${{ steps.build.outputs.digest }}
        run: |
          trivy image \
            --platform ${{ matrix.platform }} \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --pkg-types os \
            "$IMAGE"

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release_merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release_build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Create multi-arch manifest
        id: manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          tag_args=$(printf '%s\n' "$TAGS" | grep -v '^$' | sed 's/^/-t /' | tr '\n' ' ')
          # shellcheck disable=SC2086,SC2046
          docker buildx imagetools create $tag_args \
            $(printf "$IMAGE@sha256:%s " *)
          digest=$(docker buildx imagetools inspect "$IMAGE:sha-${GITHUB_SHA::7}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Smoke test the image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE@$DIGEST"
          docker tag "$IMAGE@$DIGEST" pwa-soundboard:smoke
          docker run -d --name smoke -p 3000:3000 \
            -e HOST=0.0.0.0 -e PORT=3000 \
            pwa-soundboard:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/ >/dev/null 2>&1; then
              echo "Container is responding"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container did not respond within 15 seconds"
          docker logs smoke
          exit 1
      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  release_promote:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      actions: read

    # needs: lint buys time for the concurrent main-branch build to register
    # in the GitHub API before the build-exists guard queries it. The promote
    # script then polls for the image that the branch build is producing.
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release tag metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Promote release tags
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/pwa-soundboard
          TAGS: ${{ steps.meta.outputs.tags }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          SOURCE="$IMAGE:sha-${GITHUB_SHA::7}"

          # Fail fast: if no build exists for this commit on the default
          # branch (including in-progress), the image will never appear.
          # This catches tags on pre-merge commits without wasting 30 min.
          if ! builds=$(gh api \
            "repos/$REPO/actions/workflows/ci-release.yml/runs?head_sha=$GITHUB_SHA&branch=$DEFAULT_BRANCH" \
            --jq '[.workflow_runs[] | select(.conclusion != "cancelled" and .conclusion != "skipped")] | length'); then
            echo "warning: could not query workflow runs for ${GITHUB_SHA::7}; skipping build-exists guard and polling directly"
            builds=""
          fi
          if [ "$builds" = "0" ]; then
            echo "::error::Commit ${GITHUB_SHA::7} was never built on $DEFAULT_BRANCH, so $SOURCE does not exist. Re-tag the built commit you intend to release (confirm its package.json version matches $GITHUB_REF_NAME), e.g. git tag -f $GITHUB_REF_NAME <sha> && git push -f origin $GITHUB_REF_NAME" >&2
            exit 1
          fi

          # A usable branch run exists (possibly still building). Poll for
          # the image. git push --follow-tags starts the branch and tag runs
          # concurrently, so the image may still be in flight.
          echo "found ${builds:-unknown} $DEFAULT_BRANCH run(s) for ${GITHUB_SHA::7}; waiting for $SOURCE (up to 30 minutes)"
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "$SOURCE" >/dev/null 2>&1; then
              echo "Found $SOURCE after $((i * 30)) seconds"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::$SOURCE not found after 30 minutes despite a $DEFAULT_BRANCH run for this commit. Check that run's release_build job." >&2
              exit 1
            fi
            sleep 30
          done
          digest=$(docker buildx imagetools inspect "$SOURCE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          printf '%s\n' "$TAGS" \
            | grep -v '^$' \
            | xargs -r -P4 -I{} sh -c 'echo "promoting $1"; docker buildx imagetools create -t "$1" "$2"' _ {} "$IMAGE@$digest"
